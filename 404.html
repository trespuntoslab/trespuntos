  <style>
    .error-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      text-align: center;
    }

    .error-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255, 107, 107, .12);
      border: 1.5px solid rgba(255, 107, 107, .3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      animation: popIn .5s cubic-bezier(.34, 1.56, .64, 1);
    }

    .error-icon svg {
      width: 40px;
      height: 40px;
      color: #ff6b6b;
    }

    .error-code {
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 800;
      color: var(--text-primary, #fff);
      line-height: 1;
      margin-bottom: .5rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .error-h1 {
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 600;
      margin-bottom: .75rem;
      color: var(--text-primary, #fff);
    }

    .error-p {
      font-size: 1rem;
      color: var(--text-secondary, #999);
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .875rem 1.75rem;
      background: var(--mint, #5dffbf);
      color: #0a0a0a;
      font-weight: 600;
      font-size: .95rem;
      border-radius: 8px;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
    }

    .btn-home:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(93, 255, 191, .2);
    }

    .btn-contact {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .875rem 1.75rem;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .12);
      color: var(--text-primary, #fff);
      font-weight: 600;
      font-size: .95rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background .2s, border-color .2s;
    }

    .btn-contact:hover {
      background: rgba(255, 255, 255, .1);
      border-color: rgba(255, 255, 255, .2);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
